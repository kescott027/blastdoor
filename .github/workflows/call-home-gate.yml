name: Call-Home Gate

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: call-home-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-home-gate:
    name: Call-Home Module Gate
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: npm ci

      - name: Run call-home integration tests
        run: npm run test:call-home

      - name: Install Playwright browser + deps
        run: npx playwright install --with-deps chromium

      - name: Run call-home Playwright suite
        run: npm run test:integration:call-home

      - name: Upload call-home Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: call-home-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload call-home Playwright test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: call-home-playwright-test-results
          path: test-results/
          if-no-files-found: ignore
