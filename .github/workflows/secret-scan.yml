name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "41 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: secrets-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            zricethezav/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 \
            detect --source=/repo --no-git --config=/repo/.gitleaks.toml --redact --report-format json --report-path=/repo/gitleaks-results.json --exit-code 0

          leak_count="$(jq 'length' gitleaks-results.json)"
          echo "Gitleaks findings: ${leak_count}"
          if [ "${leak_count}" -gt 0 ]; then
            echo "::error::Gitleaks found ${leak_count} potential secrets."
            jq -r '.[0:20][] | "- [\(.RuleID)] \(.File):\(.StartLine)"' gitleaks-results.json || true
            exit 1
          fi

      - name: Generate SARIF report
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            zricethezav/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 \
            detect --source=/repo --no-git --config=/repo/.gitleaks.toml --redact --report-format sarif --report-path=/repo/gitleaks-results.sarif --exit-code 0

      - name: Upload Gitleaks SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        continue-on-error: true
        with:
          sarif_file: gitleaks-results.sarif
